apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: platform
data:
  db-host: ""  # Set to RDS endpoint from Terraform output: terraform output -raw rds_address
  db-port: "5432"
  db-name: "taskdb"
  db-pool-min: "2"
  db-pool-max: "10"
  jwt-expires-in: "24h"
  metrics-enabled: "true"
