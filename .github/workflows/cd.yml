name: CD - Build, Push, and Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

  push:
    tags:
      - 'v*'
      
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Namespace to deploy to'
        required: true
        default: 'platform'
        type: choice
        options:
          - platform
          - analytics
          # Note: 'data' namespace exists but not deployed by default
          # Add it to the matrix above to deploy all 3 namespaces

env:
  AWS_REGION: us-east-1

jobs:
  check-ci-status:
    name: Check CI Pipeline Status
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Verify CI passed or manual trigger
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "✅ CI pipeline completed successfully - proceeding with deployment"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "✅ Manual trigger - proceeding with deployment"
          elif [ "${{ github.event_name }}" == "push" ]; then
            echo "✅ Version tag release - proceeding with deployment"
          fi

  build-and-push:
    name: Build and Push Docker Images
    needs: [check-ci-status]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      image-tag: ${{ steps.meta-backend.outputs.version }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Get ECR registry ID
      id: ecr-registry
      run: |
        # Get AWS account ID (which is the ECR registry ID)
        ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text)
        echo "registry_id=$ECR_REGISTRY" >> $GITHUB_OUTPUT
        echo "ECR Registry ID: $ECR_REGISTRY"
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Extract metadata for backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.ecr-registry.outputs.registry_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Extract metadata for frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.ecr-registry.outputs.registry_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EKS
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        # Deploy to 2 namespaces by default (fits on 2 t3.micro nodes)
        # To deploy to 3 namespaces, add 'data' to the list and scale nodes to 3
        namespace: [platform, analytics]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Configure kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Get EKS cluster name
      id: eks-cluster
      run: |
        # Get the first EKS cluster in the region (or use a secret if you have multiple)
        CLUSTER_NAME=$(aws eks list-clusters --region ${{ env.AWS_REGION }} --query 'clusters[0]' --output text)
        if [ -z "$CLUSTER_NAME" ] || [ "$CLUSTER_NAME" == "None" ]; then
          echo "Error: No EKS clusters found in region ${{ env.AWS_REGION }}"
          exit 1
        fi
        echo "cluster_name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
        echo "EKS Cluster: $CLUSTER_NAME"
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ steps.eks-cluster.outputs.cluster_name }}

    - name: Export kubeconfig path
      run: |
        echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

    - name: Skip ServiceMonitor if CRD missing
      run: |
        if kubectl get crd servicemonitors.monitoring.coreos.com >/dev/null 2>&1; then
          echo "ServiceMonitor CRD present - keeping manifest"
        else
          echo "ServiceMonitor CRD not found - removing manifest for namespace ${{ matrix.namespace }}"
          # Remove the manifest file if it exists
          find k8s/namespace-${{ matrix.namespace }} -name "servicemonitor.yaml" -exec rm -f {} \;
          # Remove references from kustomization.yaml to avoid kustomize errors
          if command -v yq >/dev/null 2>&1; then
            yq -i 'del(.resources[] | select(. == "servicemonitor.yaml"))' k8s/namespace-${{ matrix.namespace }}/kustomization.yaml
          else
            sed -i '/servicemonitor.yaml/d' k8s/namespace-${{ matrix.namespace }}/kustomization.yaml
          fi
        fi
    
- name: Install AWS Secrets Manager CSI Driver
      if: matrix.namespace == 'platform'
      run: |
        # Check if Secrets Store CSI Driver is already installed
        if kubectl get daemonset -n kube-system csi-secrets-store >/dev/null 2>&1; then
          echo "✅ Secrets Store CSI Driver already installed"
        else
          echo "Installing Secrets Store CSI Driver using Helm..."
          
          # Add the Secrets Store CSI Driver Helm repo
          helm repo add secrets-store-csi-driver https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
          helm repo update
          
          # Install the Secrets Store CSI Driver
          helm install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver \
            --namespace kube-system \
            --set syncSecret.enabled=true \
            --wait
          
          echo "✅ Secrets Store CSI Driver installed successfully"
        fi
        
        # Check if AWS Secrets Manager provider is already installed
        if kubectl get daemonset -n kube-system csi-secrets-store-provider-aws >/dev/null 2>&1; then
          echo "✅ AWS Secrets Manager provider already installed"
        else
          echo "Installing AWS Secrets Manager provider..."
          kubectl apply -f https://raw.githubusercontent.com/aws/secrets-store-csi-driver-provider-aws/main/deployment/aws-provider-installer.yaml
          
          # Wait for AWS provider pods to be ready
          echo "Waiting for AWS provider pods to be ready..."
          kubectl -n kube-system wait --for=condition=ready pod -l app=csi-secrets-store-provider-aws --timeout=120s || true
          
          echo "✅ AWS Secrets Manager provider installed successfully"
        fi
        
        # Verify installation
        echo ""
        echo "=== Verification ==="
        echo "Secrets Store CSI Driver pods:"
        kubectl get pods -n kube-system -l app=secrets-store-csi-driver || true
        echo ""
        echo "AWS Secrets Manager provider pods:"
        kubectl get pods -n kube-system -l app=csi-secrets-store-provider-aws || true
        echo ""
        echo "CRDs:"
        kubectl get crd | grep secrets-store || true

    - name: Get RDS Secret ARN and AWS Account ID
      run: |
        # Get the RDS secret ARN from Terraform remote state in S3
        # This reads directly from the S3 backend where Terraform stores state
        TERRAFORM_STATE_BUCKET="saas-infra-lab-terraform-state"
        TERRAFORM_STATE_KEY="saas-infra-lab/dev/infrastructure/terraform.tfstate"
        
        echo "Downloading Terraform state from S3..."
        aws s3 cp "s3://${TERRAFORM_STATE_BUCKET}/${TERRAFORM_STATE_KEY}" /tmp/terraform.tfstate
        
        # Extract RDS secret ARN from Terraform state using jq
        RDS_SECRET_ARN=$(jq -r '.outputs.rds_secret_arn.value // empty' /tmp/terraform.tfstate)
        
        if [ -z "$RDS_SECRET_ARN" ] || [ "$RDS_SECRET_ARN" == "null" ]; then
          echo "Error: Could not find rds_secret_arn in Terraform state"
          echo "State file contents (outputs only):"
          jq '.outputs' /tmp/terraform.tfstate || cat /tmp/terraform.tfstate
          exit 1
        fi
        
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        echo "RDS_SECRET_ARN=$RDS_SECRET_ARN" >> $GITHUB_ENV
        echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID" >> $GITHUB_ENV
        echo "Found RDS Secret ARN: $RDS_SECRET_ARN"
        
        # Clean up state file (contains sensitive data)
        rm -f /tmp/terraform.tfstate
        
        # Update the aws-secrets-manager.yaml with the secret ARN and AWS account ID
        sed -i "s|\${RDS_SECRET_ARN}|$RDS_SECRET_ARN|" k8s/namespace-${{ matrix.namespace }}/aws-secrets-manager.yaml
        sed -i "s|\${AWS_ACCOUNT_ID}|$AWS_ACCOUNT_ID|" k8s/namespace-${{ matrix.namespace }}/aws-secrets-manager.yaml
        
    - name: Install AWS Secrets Manager CSI Driver
      if: matrix.namespace == 'platform'  # Only install once for the platform namespace
      run: |
        # Define URLs as variables to avoid any formatting issues
        CRD_URL="https://github.com/kubernetes-sigs/secrets-store-csi-driver/releases/download/v1.4.0/secrets-store-csi-driver-crds.yaml"
        DRIVER_URL="https://raw.githubusercontent.com/kubernetes-sigs/secrets-store-csi-driver/v1.4.0/deploy/secrets-store-csi-driver.yaml"
        PROVIDER_URL="https://raw.githubusercontent.com/aws/secrets-store-csi-driver-provider-aws/main/deployment/aws-provider-installer.yaml"
        
        # Check if CRD is already installed
        if kubectl get crd secretproviderclasses.secrets-store.csi.x-k8s.io >/dev/null 2>&1; then
          echo "CSI Secrets Store CRD already installed"
        else
          echo "Installing CSI Secrets Store Driver CRDs..."
          kubectl apply -f "${CRD_URL}"
        fi
        
        # Wait for CRD to be ready
        echo "Waiting for SecretProviderClass CRD to be ready..."
        kubectl wait --for condition=established --timeout=60s crd/secretproviderclasses.secrets-store.csi.x-k8s.io || true
        
        # Check if CSI driver is already installed
        if kubectl get daemonset -n kube-system csi-secrets-store-csi-driver >/dev/null 2>&1; then
          echo "CSI Secrets Store Driver already installed"
        else
          echo "Installing CSI Secrets Store Driver..."
          kubectl apply -f "${DRIVER_URL}"
        fi
        
        # Install the AWS provider for Secrets Manager
        echo "Installing AWS Secrets Manager provider..."
        kubectl apply -f "${PROVIDER_URL}"
        
        # Wait for AWS provider pods to be ready
        echo "Waiting for AWS provider pods..."
        kubectl -n kube-system wait --for=condition=ready pod -l app=csi-secrets-store-provider-aws --timeout=120s || true
        
        # Wait for CSI driver pods to be ready (if installed)
        if kubectl get daemonset -n kube-system csi-secrets-store-csi-driver >/dev/null 2>&1; then
          echo "Waiting for CSI driver pods..."
          kubectl -n kube-system wait --for=condition=ready pod -l app=secrets-store-csi-driver --timeout=120s || true
        fi
        
        # Verify installation
        echo "Verifying installation..."
        kubectl get crd | grep secrets-store || true
        kubectl get pods -n kube-system | grep -E "(csi-secrets-store|secrets-store-provider-aws)" || true

    - name: Deploy Secrets Manager Configuration
      if: matrix.namespace == 'platform'  # Only deploy once for the platform namespace
      run: |
        # Ensure CRD is ready before applying SecretProviderClass
        echo "Checking SecretProviderClass CRD..."
        kubectl wait --for condition=established --timeout=60s crd/secretproviderclasses.secrets-store.csi.x-k8s.io || {
          echo "Error: SecretProviderClass CRD not available"
          kubectl get crd secretproviderclasses.secrets-store.csi.x-k8s.io
          exit 1
        }
        
        # Create the secret provider class
        echo "Applying SecretProviderClass..."
        kubectl apply -f k8s/namespace-${{ matrix.namespace }}/aws-secrets-manager.yaml
        
        # Wait for the secret to be available (may take a few seconds for CSI to sync)
        echo "Waiting for secret to be available..."
        for i in {1..30}; do
          if kubectl get secret -n ${{ matrix.namespace }} db-credentials >/dev/null 2>&1; then
            echo "Secret db-credentials is available"
            break
          fi
          echo "Waiting for secret... ($i/30)"
          sleep 2
        done
        
        # Verify secret exists
        if ! kubectl get secret -n ${{ matrix.namespace }} db-credentials >/dev/null 2>&1; then
          echo "Warning: Secret db-credentials not found after waiting"
          echo "Checking SecretProviderClass status..."
          kubectl get secretproviderclass -n ${{ matrix.namespace }} || true
          kubectl describe secretproviderclass -n ${{ matrix.namespace }} || true
        else
          echo "✅ Secret db-credentials is ready"
        fi

    - name: Get ECR repository URLs
      id: ecr-repos
      run: |
        # Build ECR repository URLs from secrets
        ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text)
        BACKEND_REPO="${ECR_REGISTRY}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}"
        FRONTEND_REPO="${ECR_REGISTRY}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}"
        echo "backend_repo=$BACKEND_REPO" >> $GITHUB_OUTPUT
        echo "frontend_repo=$FRONTEND_REPO" >> $GITHUB_OUTPUT
        echo "Backend repo: $BACKEND_REPO"
        echo "Frontend repo: $FRONTEND_REPO"
    
    - name: Update Kubernetes manifests with image tags
      run: |
        # Use commit SHA as image tag (or latest if not available)
        IMAGE_TAG="${{ github.sha }}"
        if [ -z "$IMAGE_TAG" ]; then
          IMAGE_TAG="latest"
        fi
        
        BACKEND_IMAGE="${{ steps.ecr-repos.outputs.backend_repo }}:$IMAGE_TAG"
        FRONTEND_IMAGE="${{ steps.ecr-repos.outputs.frontend_repo }}:$IMAGE_TAG"
        
        echo "Updating manifests with:"
        echo "  Backend: $BACKEND_IMAGE"
        echo "  Frontend: $FRONTEND_IMAGE"
        
        # Update backend deployment
        find k8s/namespace-${{ matrix.namespace }} -name "*backend-deployment.yaml" -exec sed -i "s|image:.*task-management-backend.*|image: $BACKEND_IMAGE|g" {} \;
        
        # Update frontend deployment
        find k8s/namespace-${{ matrix.namespace }} -name "*frontend-deployment.yaml" -exec sed -i "s|image:.*task-management-frontend.*|image: $FRONTEND_IMAGE|g" {} \;
    
    - name: Deploy to ${{ matrix.namespace }} namespace
      run: |
        kubectl apply -k k8s/namespace-${{ matrix.namespace }}
        kubectl rollout status deployment/backend -n ${{ matrix.namespace }} --timeout=5m || true
        kubectl rollout status deployment/frontend -n ${{ matrix.namespace }} --timeout=5m || true
    
    - name: Verify deployment
      run: |
        echo "=== Pods in ${{ matrix.namespace }} namespace ==="
        kubectl get pods -n ${{ matrix.namespace }}
        echo ""
        echo "=== Services in ${{ matrix.namespace }} namespace ==="
        kubectl get services -n ${{ matrix.namespace }}
