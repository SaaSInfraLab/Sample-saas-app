name: CD - Build, Push, and Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
    # Only trigger on successful CI runs to avoid cluttering Actions UI
    # The conclusion check is also in check-ci-status job for redundancy

  push:
    tags:
      - 'v*'
      
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Namespace to deploy to'
        required: true
        default: 'platform'
        type: choice
        options:
          - platform
          - analytics
          # Note: 'data' namespace exists but not deployed by default
          # Add it to the matrix above to deploy all 3 namespaces

env:
  AWS_REGION: us-east-1
  TERRAFORM_STATE_BUCKET: saas-infra-lab-terraform-state
  TERRAFORM_STATE_KEY: saas-infra-lab/dev/infrastructure/terraform.tfstate

jobs:
  check-ci-status:
    name: Check CI Pipeline Status
    runs-on: ubuntu-latest
    if: |
      (${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' }}) ||
      (${{ github.event_name == 'workflow_dispatch' }}) ||
      (${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }})
    steps:
      - name: Verify CI passed or manual trigger
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "✅ CI pipeline completed successfully - proceeding with deployment"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "✅ Manual trigger - proceeding with deployment"
          elif [ "${{ github.event_name }}" == "push" ]; then
            echo "✅ Version tag release - proceeding with deployment"
          fi

  build-backend:
    name: Build and Push Backend Image
    needs: [check-ci-status]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    outputs:
      image: ${{ steps.meta-backend.outputs.tags }}
      image-tag: ${{ steps.meta-backend.outputs.version }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Get ECR registry ID
      id: ecr-registry
      run: |
        ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text)
        echo "registry_id=$ECR_REGISTRY" >> $GITHUB_OUTPUT
    
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Extract metadata for backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.ecr-registry.outputs.registry_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-frontend:
    name: Build and Push Frontend Image
    needs: [check-ci-status]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    outputs:
      image: ${{ steps.meta-frontend.outputs.tags }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Get ECR registry ID
      id: ecr-registry
      run: |
        ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text)
        echo "registry_id=$ECR_REGISTRY" >> $GITHUB_OUTPUT
    
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Extract metadata for frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.ecr-registry.outputs.registry_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  cluster-setup:
    name: Setup Cluster and Install CSI Driver
    needs: [check-ci-status]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Configure kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Get EKS cluster name
      id: eks-cluster
      run: |
        CLUSTER_NAME=$(aws eks list-clusters --region ${{ env.AWS_REGION }} --query 'clusters[0]' --output text)
        if [ -z "$CLUSTER_NAME" ] || [ "$CLUSTER_NAME" == "None" ]; then
          echo "Error: No EKS clusters found in region ${{ env.AWS_REGION }}"
          exit 1
        fi
        echo "cluster_name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ steps.eks-cluster.outputs.cluster_name }}
    
    - name: Export kubeconfig path
      run: |
        echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV
    
    - name: Install Helm
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    
    - name: Install AWS Secrets Manager CSI Driver
      run: |
        # Check if Secrets Store CSI Driver is already installed
        if kubectl get crd secretproviderclasses.secrets-store.csi.x-k8s.io >/dev/null 2>&1; then
          echo "✅ Secrets Store CSI Driver already installed (CRD exists)"
        else
          echo "Installing Secrets Store CSI Driver using Helm..."
          
          # Add the Secrets Store CSI Driver Helm repo
          helm repo add secrets-store-csi-driver https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
          helm repo update
          
          # Install the Secrets Store CSI Driver with increased timeout
          # Helm will automatically install CRDs and the driver
          helm install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver \
            --namespace kube-system \
            --set syncSecret.enabled=true \
            --timeout 10m \
            --wait
          
          echo "✅ Secrets Store CSI Driver installed successfully"
        fi
        
        # Check if AWS Secrets Manager provider is already installed
        if kubectl get daemonset -n kube-system csi-secrets-store-provider-aws >/dev/null 2>&1; then
          echo "✅ AWS Secrets Manager provider already installed"
        else
          echo "Installing AWS Secrets Manager provider..."
          kubectl apply -f https://raw.githubusercontent.com/aws/secrets-store-csi-driver-provider-aws/main/deployment/aws-provider-installer.yaml
          
          # Wait for AWS provider pods to be ready
          echo "Waiting for AWS provider pods to be ready..."
          kubectl -n kube-system wait --for=condition=ready pod -l app=csi-secrets-store-provider-aws --timeout=120s || true
          
          echo "✅ AWS Secrets Manager provider installed successfully"
        fi
        
        # Verify installation
        echo ""
        echo "=== Verification ==="
        kubectl get crd | grep secrets-store || true
        kubectl get pods -n kube-system -l app=secrets-store-csi-driver || true
        kubectl get pods -n kube-system -l app=csi-secrets-store-provider-aws || true

  deploy:
    name: Deploy to EKS
    needs: [build-backend, build-frontend, cluster-setup]
    
    outputs:
      backend-image: ${{ steps.set-images.outputs.backend-image }}
      frontend-image: ${{ steps.set-images.outputs.frontend-image }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        # Deploy to 2 namespaces by default (fits on 2 t3.micro nodes)
        # To deploy to 3 namespaces, add 'data' to the list and scale nodes to 3
        namespace: [platform, analytics]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Configure kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Get EKS cluster name
      id: eks-cluster
      run: |
        CLUSTER_NAME=$(aws eks list-clusters --region ${{ env.AWS_REGION }} --query 'clusters[0]' --output text)
        if [ -z "$CLUSTER_NAME" ] || [ "$CLUSTER_NAME" == "None" ]; then
          echo "Error: No EKS clusters found in region ${{ env.AWS_REGION }}"
          exit 1
        fi
        echo "cluster_name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
    
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ steps.eks-cluster.outputs.cluster_name }}

    - name: Export kubeconfig path
      run: |
        echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

    - name: Skip ServiceMonitor if CRD missing
      run: |
        if kubectl get crd servicemonitors.monitoring.coreos.com >/dev/null 2>&1; then
          echo "ServiceMonitor CRD present - keeping manifest"
        else
          echo "ServiceMonitor CRD not found - removing manifest for namespace ${{ matrix.namespace }}"
          # Remove servicemonitor.yaml file if it exists
          find k8s/namespace-${{ matrix.namespace }} -name "servicemonitor.yaml" -exec rm -f {} \;
          # Remove from kustomization.yaml using multiple methods for robustness
          KUSTOMIZATION_FILE="k8s/namespace-${{ matrix.namespace }}/kustomization.yaml"
          if [ -f "$KUSTOMIZATION_FILE" ]; then
            if command -v yq >/dev/null 2>&1; then
              # Use yq to properly remove the resource entry
              yq -i 'del(.resources[] | select(. == "servicemonitor.yaml"))' "$KUSTOMIZATION_FILE" || true
            fi
            # Also use sed as fallback to remove lines containing servicemonitor.yaml
            sed -i '/servicemonitor\.yaml/d' "$KUSTOMIZATION_FILE" || true
            # Remove empty lines that might result
            sed -i '/^[[:space:]]*$/d' "$KUSTOMIZATION_FILE" || true
          fi
        fi
    
    - name: Install jq
      run: |
        sudo apt-get update && sudo apt-get install -y jq

    - name: Get RDS Secret ARN and AWS Account ID
      run: |
        echo "Downloading Terraform state from S3..."
        aws s3 cp "s3://${{ env.TERRAFORM_STATE_BUCKET }}/${{ env.TERRAFORM_STATE_KEY }}" /tmp/terraform.tfstate
        
        RDS_SECRET_ARN=$(jq -r '.outputs.rds_secret_arn.value // empty' /tmp/terraform.tfstate)
        
        if [ -z "$RDS_SECRET_ARN" ] || [ "$RDS_SECRET_ARN" == "null" ]; then
          echo "Error: Could not find rds_secret_arn in Terraform state"
          jq '.outputs' /tmp/terraform.tfstate || cat /tmp/terraform.tfstate
          exit 1
        fi
        
        AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        echo "RDS_SECRET_ARN=$RDS_SECRET_ARN" >> $GITHUB_ENV
        echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID" >> $GITHUB_ENV
        echo "Found RDS Secret ARN: $RDS_SECRET_ARN"
        
        rm -f /tmp/terraform.tfstate
        
        sed -i "s|\${RDS_SECRET_ARN}|$RDS_SECRET_ARN|" k8s/namespace-${{ matrix.namespace }}/aws-secrets-manager.yaml
        sed -i "s|\${AWS_ACCOUNT_ID}|$AWS_ACCOUNT_ID|" k8s/namespace-${{ matrix.namespace }}/aws-secrets-manager.yaml

    - name: Deploy Secrets Manager Configuration
      # Only platform namespace uses AWS Secrets Manager CSI driver for db-credentials
      # Analytics namespace uses postgresql-secret and backend-config created by Terraform
      if: matrix.namespace == 'platform'
      run: |
        echo "Checking SecretProviderClass CRD..."
        kubectl wait --for condition=established --timeout=60s crd/secretproviderclasses.secrets-store.csi.x-k8s.io || {
          echo "Error: SecretProviderClass CRD not available"
          kubectl get crd secretproviderclasses.secrets-store.csi.x-k8s.io
          exit 1
        }
        
        echo "Applying SecretProviderClass..."
        kubectl apply -f k8s/namespace-${{ matrix.namespace }}/aws-secrets-manager.yaml
        
        # Trigger secret creation by running a one-time job that mounts the SecretProviderClass
        echo "Triggering secret sync with init job..."
        NAMESPACE="${{ matrix.namespace }}"
        cat > /tmp/secret-sync-job.yaml <<'EOF'
apiVersion: batch/v1
kind: Job
metadata:
  name: secret-sync-trigger-PLACEHOLDER
  namespace: PLACEHOLDER
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: backend-sa
      restartPolicy: OnFailure
      containers:
      - name: secret-sync
        image: busybox:1.36
        command: ['sh', '-c', 'echo "Triggering secret sync..." && ls -la /mnt/secrets-store/ && echo "Done"']
        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
        resources:
          requests:
            cpu: "10m"
            memory: "16Mi"
          limits:
            cpu: "50m"
            memory: "32Mi"
      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "db-secret-provider"
EOF
        sed -i "s/PLACEHOLDER/${NAMESPACE}/g" /tmp/secret-sync-job.yaml
        kubectl apply -f /tmp/secret-sync-job.yaml
        
        # Wait for job to complete (max 60 seconds)
        echo "Waiting for secret sync job to complete..."
        kubectl wait --for=condition=complete --timeout=60s job/secret-sync-trigger-${NAMESPACE} -n ${NAMESPACE} || true
        
        # Clean up the job
        kubectl delete job secret-sync-trigger-${NAMESPACE} -n ${NAMESPACE} --ignore-not-found=true
        
        echo "Waiting for secret to be available (CSI driver sync can take up to 2 minutes)..."
        SECRET_READY=false
        for i in {1..60}; do
          if kubectl get secret -n ${NAMESPACE} db-credentials >/dev/null 2>&1; then
            echo "✅ Secret db-credentials is available"
            SECRET_READY=true
            break
          fi
          echo "Waiting for secret sync... ($i/60)"
          sleep 2
        done
        
        if [ "$SECRET_READY" != "true" ]; then
          echo "⚠️  Warning: Secret not synced by CSI driver after 2 minutes, will create manually"
        fi
        
        if ! kubectl get secret -n ${NAMESPACE} db-credentials >/dev/null 2>&1; then
          echo "Secret db-credentials not found after waiting. Creating it from AWS Secrets Manager..."
          
          # Get secret from AWS Secrets Manager and create Kubernetes secret
          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id ${{ env.RDS_SECRET_ARN }} \
            --query SecretString \
            --output text)
          
          DB_HOST=$(echo $SECRET_JSON | jq -r '.host')
          DB_PORT=$(echo $SECRET_JSON | jq -r '.port')
          DB_NAME=$(echo $SECRET_JSON | jq -r '.dbname')
          DB_USER=$(echo $SECRET_JSON | jq -r '.username')
          DB_PASS=$(echo $SECRET_JSON | jq -r '.password')
          
          kubectl create secret generic db-credentials -n ${NAMESPACE} \
            --from-literal=db-host="$DB_HOST" \
            --from-literal=db-port="$DB_PORT" \
            --from-literal=db-name="$DB_NAME" \
            --from-literal=db-username="$DB_USER" \
            --from-literal=db-password="$DB_PASS" \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "✅ Secret db-credentials created from AWS Secrets Manager"
        else
          echo "✅ Secret db-credentials is ready"
        fi

    - name: Update Kubernetes manifests with image tags
      run: |
        # Try to get image tags from build job outputs first, fallback to computed tags
        ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text)
        
        # Determine image tag based on build job outputs or compute from context
        if [ "${{ github.ref }}" == "refs/heads/main" ] || [ "${{ github.ref }}" == "refs/heads/master" ]; then
          IMAGE_TAG="latest"
        else
          BRANCH_NAME="${{ github.ref_name }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          IMAGE_TAG="${BRANCH_NAME}-${SHORT_SHA}"
        fi
        
        BACKEND_IMAGE="${ECR_REGISTRY}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}:$IMAGE_TAG"
        FRONTEND_IMAGE="${ECR_REGISTRY}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}:$IMAGE_TAG"
        
        echo "Updating manifests with:"
        echo "  Backend: $BACKEND_IMAGE"
        echo "  Frontend: $FRONTEND_IMAGE"
        
        # Verify images exist in ECR - try multiple tag formats
        echo "Verifying images exist in ECR..."
        IMAGE_FOUND=false
        for TAG in "$IMAGE_TAG" "latest" "${{ github.ref_name }}-${{ github.sha }}" "${{ github.sha }}"; do
          if aws ecr describe-images --repository-name ${{ secrets.ECR_BACKEND_REPO }} --image-ids imageTag=$TAG --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "✅ Found backend image with tag: $TAG"
            BACKEND_IMAGE="${ECR_REGISTRY}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}:$TAG"
            FRONTEND_IMAGE="${ECR_REGISTRY}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}:$TAG"
            IMAGE_FOUND=true
            break
          fi
        done
        
        if [ "$IMAGE_FOUND" != "true" ]; then
          echo "⚠️  Warning: Could not find backend image with any expected tag, using computed tag: $IMAGE_TAG"
        fi
        
        find k8s/namespace-${{ matrix.namespace }} -name "*backend-deployment.yaml" -exec sed -i "s|image:.*task-management-backend.*|image: $BACKEND_IMAGE|g" {} \;
        find k8s/namespace-${{ matrix.namespace }} -name "*frontend-deployment.yaml" -exec sed -i "s|image:.*task-management-frontend.*|image: $FRONTEND_IMAGE|g" {} \;
    
    - name: Check node resources and pod capacity
      run: |
        echo "=== Node Resources & Pod Capacity ==="
        for node in $(kubectl get nodes -o jsonpath='{.items[*].metadata.name}'); do
          echo ""
          echo "Node: $node"
          POD_CAPACITY=$(kubectl get node $node -o jsonpath='{.status.capacity.pods}')
          POD_ALLOCATABLE=$(kubectl get node $node -o jsonpath='{.status.allocatable.pods}')
          RUNNING_PODS=$(kubectl get pods --all-namespaces --field-selector=status.phase=Running -o wide | grep $node | wc -l)
          PENDING_PODS=$(kubectl get pods --all-namespaces --field-selector=status.phase=Pending -o wide | grep $node | wc -l)
          echo "  Pod Capacity: $POD_CAPACITY"
          echo "  Pod Allocatable: $POD_ALLOCATABLE"
          echo "  Running Pods: $RUNNING_PODS"
          echo "  Pending Pods: $PENDING_PODS"
          if [ "$RUNNING_PODS" -ge "$POD_CAPACITY" ]; then
            echo "  ❌ ERROR: Node is at pod capacity! Cannot schedule more pods."
            echo "  💡 Solution: Increase max pods per node or upgrade to larger instance types"
            NODE_CAPACITY_ISSUE=true
          fi
        done
        echo ""
        echo "=== Node Details ==="
        kubectl get nodes -o custom-columns=NAME:.metadata.name,CPU:.status.capacity.cpu,MEMORY:.status.capacity.memory,PODS:.status.capacity.pods,INSTANCE-TYPE:.metadata.labels.'beta\.kubernetes\.io/instance-type'
        echo ""
        echo "=== Pending Pods Summary ==="
        PENDING_COUNT=$(kubectl get pods --all-namespaces --field-selector=status.phase=Pending --no-headers 2>/dev/null | wc -l)
        if [ "$PENDING_COUNT" -gt 0 ]; then
          echo "Found $PENDING_COUNT pending pods:"
          kubectl get pods --all-namespaces --field-selector=status.phase=Pending -o wide
          echo ""
          echo "=== Pending Pod Reasons ==="
          for pod in $(kubectl get pods --all-namespaces --field-selector=status.phase=Pending -o jsonpath='{range .items[*]}{.metadata.namespace}{"/"}{.metadata.name}{"\n"}{end}'); do
            NS=$(echo $pod | cut -d'/' -f1)
            NAME=$(echo $pod | cut -d'/' -f2)
            echo "Pod: $NS/$NAME"
            kubectl describe pod $NAME -n $NS | grep -A 3 "Events:" | tail -3 || true
          done
        else
          echo "No pending pods found."
        fi
        
        # Fail if nodes are at capacity
        if [ "${NODE_CAPACITY_ISSUE:-false}" == "true" ]; then
          echo ""
          echo "❌ Deployment blocked: One or more nodes are at pod capacity"
          echo "Please increase node capacity or scale up the cluster before deploying"
          exit 1
        fi
    
    - name: Deploy to ${{ matrix.namespace }} namespace
      run: |
        kubectl apply -k k8s/namespace-${{ matrix.namespace }}
        echo "Waiting 10 seconds for pods to be created..."
        sleep 10
        
        # Wait for deployments with proper error handling
        echo "Waiting for backend deployment to be ready..."
        if kubectl rollout status deployment/backend -n ${{ matrix.namespace }} --timeout=5m; then
          echo "✅ Backend deployment successful"
        else
          echo "❌ Backend deployment failed or timed out"
          kubectl describe deployment backend -n ${{ matrix.namespace }}
          kubectl logs -n ${{ matrix.namespace }} -l app=backend --tail=50 || true
          exit 1
        fi
        
        echo "Waiting for frontend deployment to be ready..."
        if kubectl rollout status deployment/frontend -n ${{ matrix.namespace }} --timeout=5m; then
          echo "✅ Frontend deployment successful"
        else
          echo "❌ Frontend deployment failed or timed out"
          kubectl describe deployment frontend -n ${{ matrix.namespace }}
          kubectl logs -n ${{ matrix.namespace }} -l app=frontend --tail=50 || true
          exit 1
        fi
    
    - name: Verify deployment
      run: |
        echo "=== Pods in ${{ matrix.namespace }} namespace ==="
        kubectl get pods -n ${{ matrix.namespace }}
        echo ""
        echo "=== Pod Events (for troubleshooting) ==="
        kubectl get events -n ${{ matrix.namespace }} --sort-by='.lastTimestamp' | tail -20 || true
        echo ""
        echo "=== Pod Details (if pending) ==="
        for pod in $(kubectl get pods -n ${{ matrix.namespace }} -o jsonpath='{.items[?(@.status.phase=="Pending")].metadata.name}'); do
          if [ -n "$pod" ]; then
            echo "--- Describing pending pod: $pod ---"
            kubectl describe pod $pod -n ${{ matrix.namespace }} || true
          fi
        done
        echo ""
        echo "=== Resource Quotas ==="
        kubectl get resourcequota -n ${{ matrix.namespace }} || true
        echo ""
        echo "=== Node Resources ==="
        kubectl top nodes 2>/dev/null || echo "Metrics server not available"
        echo ""
        echo "=== Services in ${{ matrix.namespace }} namespace ==="
        kubectl get services -n ${{ matrix.namespace }}
